<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="11-tareaResuelta.css">
</head>

<body>
    <header>
        <h1>Inscripcion para evento de musica electronica</h1>
    </header>

    <form>
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" required>
        <label for="apellido">Apellido</label>
        <input type="text" id="apellido" required>
        <label for="email">Email</label>
        <input type="email" id="email" required>
        <label>Seleccione el dia de su interes</label>
        <select required>
            <option value="" selected disabled>Seleccione un dia</option>
            <option value="">Viernes</option>
            <option value="">Sabado</option>
            <option value="">Domingo</option>
        </select>
        <button>Enviar</button>
    </form>
</body>

</html>
